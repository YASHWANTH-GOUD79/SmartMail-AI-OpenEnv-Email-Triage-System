version: "1.0"

name: "SmartMail AI"
description: "Email classification environment using OpenEnv"

entry_point: env:EmailEnv

tasks:
  - id: easy_task
    name: Easy
    description: "Easy binary classification task"
    difficulty: easy
    grader: "email_tasks.easy.grader:grade"
    category: "classification"
    tags: ["nlp", "email"]

  - id: medium_task
    name: Medium
    description: "Multi-class classification task"
    difficulty: medium
    grader: "email_tasks.medium.grader:grade"
    category: "classification"
    tags: ["nlp", "business"]

  - id: hard_task
    name: Hard
    description: "Advanced classification task"
    difficulty: hard
    grader: "email_tasks.hard.grader:grade"
    category: "classification"
    tags: ["nlp", "phishing"]
